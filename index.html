<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Words Galore</title>

<style>
:root {
  --bg-a:#fff6b8; --bg-b:#ffd7ee; --bg-c:#d6f3ff;
  --ink:#25324a; --card:rgba(255,255,255,0.94);
  --pink:#ff5fa2; --blue:#49c7f2; --green:#22c878;
  --purple:#6e7ff2; --gold:#ffbf3f;
}

body {
  margin:0; font-family:Arial; padding:18px;
  background:linear-gradient(135deg,#fffbe2,#ffe8f6,#e7f8ff);
}

.wrap {
  max-width:1100px; margin:auto; background:white;
  border-radius:20px; padding:20px;
}

.grid {
  display:grid; grid-template-columns:repeat(6,1fr);
  gap:10px;
}

.tile {
  aspect-ratio:1;
  font-size:24px; font-weight:bold;
  border-radius:12px; border:none;
  background:#eef8ff;
}

.selected { background:gold; }

.current-box {
  margin-top:10px; text-align:center;
  font-size:22px; font-weight:bold;
}

button { padding:10px; border:none; border-radius:20px; margin:5px; color:white; }
.green{background:#22c878;}
.purple{background:#6e7ff2;}
.blue{background:#49c7f2;}
.pink{background:#ff5fa2;}
</style>
</head>

<body>

<div class="wrap">

<h2>Words Galore</h2>

<div>Time: <span id="timeDisplay">90</span></div>
<div>Words: <span id="wordsDisplay">0</span></div>

<div class="grid" id="grid"></div>

<div class="current-box" id="currentWord">Select Letters</div>

<button class="green" onclick="submit()">Submit</button>
<button class="purple" onclick="clearWord()">Clear</button>

<ul id="wordList"></ul>

</div>

<script>

// ✅ LOAD WORD LIST
let WORDS = new Set();

async function loadWords() {
  const res = await fetch('words.txt');
  const text = await res.text();

  WORDS = new Set(
    text.split('\n')
        .map(w => w.trim().toLowerCase())
        .filter(w => w.length >= 3)
  );
}

// GAME VARIABLES
const LETTER_POOL = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let board=[], path=[], found=new Set();
let time=90, active=true;

// BUILD BOARD
function init() {
  board = Array.from({length:6},()=>Array.from({length:6},()=>LETTER_POOL[Math.floor(Math.random()*26)]));
  found.clear();
  time=90;
  active=true;
  draw();
  timer();
}

// DRAW GRID
function draw() {
  grid.innerHTML="";
  board.forEach((row,i)=>row.forEach((letter,j)=>{
    let b=document.createElement("button");
    b.className="tile"+(path.some(p=>p.i==i&&p.j==j)?" selected":"");
    b.textContent=letter;

    b.onpointerdown=()=>{ path=[{i,j}]; draw(); };
    b.onpointerenter=e=>{
      if(e.buttons){
        let last=path[path.length-1];
        if(Math.abs(last.i-i)<=1 && Math.abs(last.j-j)<=1 &&
           !path.some(p=>p.i==i&&p.j==j)){
          path.push({i,j}); draw();
        }
      }
    };

    grid.appendChild(b);
  }));

  currentWord.textContent = path.map(p=>board[p.i][p.j]).join("") || "Select Letters";
  wordsDisplay.textContent = found.size;
}

// SUBMIT WORD
function submit() {
  let word = currentWord.textContent.toLowerCase();

  if(word.length>=3 && WORDS.has(word) && !found.has(word)){
    found.add(word);

    let li=document.createElement("li");
    li.textContent=word;
    wordList.appendChild(li);
  }

  path=[];
  draw();
}

// CLEAR
function clearWord(){
  path=[];
  draw();
}

// TIMER
function timer(){
  let t=setInterval(()=>{
    time--;
    timeDisplay.textContent=time;

    if(time<=0){
      clearInterval(t);
      alert("You found "+found.size+" words!");
      active=false;
    }
  },1000);
}

// START GAME AFTER WORDS LOAD
loadWords().then(()=>{
  init();
});

</script>

</body>
</html>
