<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Words Galore</title>
  <style>
    :root {
      --bg-a: #fff6b8;
      --bg-b: #ffd7ee;
      --bg-c: #d6f3ff;
      --ink: #25324a;
      --card: rgba(255,255,255,0.9);
      --pink: #ff5fa2;
      --blue: #49c7f2;
      --green: #22c878;
      --purple: #6e7ff2;
      --gold: #ffbf3f;
      --bad: #ef476f;
      --shadow: 0 16px 36px rgba(37,50,74,0.14);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 10%, var(--bg-b), transparent 24%),
        radial-gradient(circle at 90% 14%, var(--bg-c), transparent 24%),
        linear-gradient(135deg, #fffbe2, #ffe8f6 50%, #e7f8ff);
      padding: 18px;
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 24px;
      border: 1px solid rgba(255,255,255,0.85);
      backdrop-filter: blur(5px);
    }

    .hero {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 5vw, 4rem);
      line-height: 1;
      letter-spacing: 0.2px;
    }

    .sub {
      margin: 8px 0 0;
      font-size: 1.1rem;
      opacity: 0.82;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 14px;
      width: 100%;
    }

    .stat {
      background: rgba(255,255,255,0.92);
      border-radius: 22px;
      padding: 16px 18px;
      text-align: center;
      box-shadow: 0 10px 22px rgba(37,50,74,0.08);
    }

    .stat-label {
      display: block;
      font-size: 0.84rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6d7689;
      margin-bottom: 6px;
    }

    .stat-value {
      display: block;
      font-size: 2rem;
      font-weight: 800;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 22px;
      align-items: start;
    }

    .panel {
      background: rgba(255,255,255,0.92);
      border-radius: 26px;
      box-shadow: 0 10px 24px rgba(37,50,74,0.08);
      padding: 20px;
    }

    .panel-head {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .panel-head h2,
    .side h2 {
      margin: 0;
      font-size: 1.25rem;
    }

    .head-note {
      font-size: 1rem;
      font-weight: 700;
      max-width: 520px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .tile {
      aspect-ratio: 1 / 1;
      border: 0;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff, #eef8ff);
      color: var(--ink);
      font-size: clamp(1.45rem, 2.2vw, 2rem);
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(73,199,242,0.16);
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tile:hover { transform: translateY(-2px); }

    .tile.selected {
      background: linear-gradient(180deg, #ffe797, var(--gold));
      box-shadow: 0 12px 24px rgba(255,191,63,0.34);
      transform: scale(1.04);
    }

    .tile.locked {
      cursor: default;
    }

    .current-box {
      margin-top: 16px;
      background: linear-gradient(90deg, #f9ddf0, #dfefff);
      border-radius: 20px;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      font-size: 1.7rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(37,50,74,0.06);
    }

    .actions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(37,50,74,0.12);
      transition: transform 0.14s ease, opacity 0.14s ease;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-green { background: linear-gradient(135deg, var(--green), #30db8d); }
    .btn-purple { background: linear-gradient(135deg, var(--purple), #8895ff); }
    .btn-blue { background: linear-gradient(135deg, var(--blue), #6ad7fb); }
    .btn-pink { background: linear-gradient(135deg, var(--pink), #ff84bb); }

    .message {
      min-height: 28px;
      margin-top: 12px;
      font-size: 1rem;
      font-weight: 800;
    }

    .good { color: var(--green); }
    .bad { color: var(--bad); }

    .side-card {
      display: grid;
      gap: 16px;
    }

    .help {
      padding: 14px;
      border-radius: 18px;
      background: #f6fbff;
      line-height: 1.45;
      font-size: 0.98rem;
    }

    .word-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      max-height: 520px;
      overflow: auto;
    }

    .word-list li {
      background: linear-gradient(90deg, #fff7d8, #fff);
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 800;
      text-transform: uppercase;
      box-shadow: inset 0 0 0 1px rgba(37,50,74,0.05);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(37,50,74,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
    }

    .overlay.show { display: flex; }

    .modal {
      background: #fff;
      width: min(92vw, 560px);
      border-radius: 28px;
      box-shadow: 0 18px 54px rgba(0,0,0,0.18);
      padding: 28px 24px;
      text-align: center;
    }

    .modal h3 {
      margin: 0 0 12px;
      font-size: 2.2rem;
    }

    .big {
      font-size: 3rem;
      font-weight: 900;
      color: var(--pink);
      margin: 8px 0 12px;
    }

    .modal-line {
      font-size: 1.14rem;
      margin: 10px 0;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(120px,
