<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Words Galore</title>
  <style>
    :root {
      --ink: #25324a; --pink: #ff5fa2; --blue: #49c7f2; 
      --green: #22c878; --purple: #6e7ff2; --gold: #ffbf3f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      color: var(--ink);
      background: #fdfcf0;
      padding: 8px;
      touch-action: none; /* Prevents screen scrolling while playing */
    }

    .wrap {
      max-width: 480px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    h1 { margin: 0; font-size: 1.4rem; color: var(--purple); }

    .stats { display: flex; gap: 8px; }
    .stat {
      background: #f0f4f8;
      padding: 4px 10px;
      border-radius: 8px;
      text-align: center;
      min-width: 65px;
    }
    .stat-label { display: block; font-size: 0.6rem; text-transform: uppercase; color: #6d7689; }
    .stat-value { font-weight: 800; font-size: 1.1rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      user-select: none;
    }

    .tile {
      aspect-ratio: 1 / 1;
      border: 0;
      border-radius: 10px;
      background: #f8f9fa;
      font-size: 1.4rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.1);
      cursor: pointer;
      pointer-events: auto;
    }

    .falling {
      animation: fallBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) backwards;
    }

    @keyframes fallBounce {
      0% { transform: translateY(-30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .tile.selected {
      background: var(--gold);
      color: white;
      transform: scale(0.95);
      box-shadow: none;
    }

    .current-box {
      margin: 10px 0;
      background: #f1f1f1;
      border-radius: 8px;
      padding: 8px;
      font-size: 1.1rem;
      font-weight: 800;
      text-align: center;
      min-height: 40px;
      color: var(--purple);
      text-transform: uppercase;
    }

    .actions { display: flex; gap: 6px; }
    .btn {
      flex: 1;
      border: 0;
      border-radius: 8px;
      padding: 10px 5px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .btn-purple { background: var(--purple); }
    .btn-blue { background: var(--blue); }
    .btn-pink { background: var(--pink); }

    .word-area {
      margin-top: 10px;
      border-top: 1px solid #eee;
      padding-top: 8px;
    }

    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      list-style: none;
      padding: 0;
      margin: 5px 0 0;
      max-height: 70px;
      overflow-y: auto;
    }

    .word-list li {
      background: #eef2f5;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="hero">
    <h1>Words Galore</h1>
    <div class="stats">
      <div class="stat"><span class="stat-label">Time</span><span class="stat-value" id="time">1:30</span></div>
      <div class="stat"><span class="stat-label">Words</span><span class="stat-value" id="score">0</span></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  
  <div class="current-box" id="currentWord">Connect 3+ Letters</div>

  <div class="actions">
    <button class="btn btn-purple" id="clearBtn">Clear</button>
    <button class="btn btn-blue" id="shuffleBtn">Shuffle</button>
    <button class="btn btn-pink" id="newGameBtn">New Game</button>
  </div>

  <div class="word-area">
    <div style="font-size: 0.7rem; font-weight: 800; color: #999; text-transform: uppercase;">Words Found (3+ letters)</div>
    <ul class="word-list" id="wordList"></ul>
  </div>
</div>

<script>
  // Core word list - expanded with common 4+ letter words
  const WORDS = new Set(["moo","one","lone","tail","able","acid","also","area","army","away","back","ball","band","bank","base","bath","bear","beat","been","bell","belt","best","bird","blue","boat","body","bomb","bond","bone","book","boom","born","boss","both","bowl","bulk","burn","bush","busy","cake","call","calm","came","camp","card","care","case","cash","cast","cell","chat","city","club","coat","code","cold","come","cook","cool","copy","cost","crew","crop","dark","data","date","dawn","dead","deal","dear","debt","deep","desk","dial","diet","dirt","dish","disk","does","done","door","dose","down","draw","drew","drop","drug","drum","dual","duke","dust","duty","each","earn","east","easy","edge","else","even","ever","exam","exit","face","fact","fail","fair","fall","farm","fast","fate","fear","feed","feel","feet","fell","felt","file","fill","film","find","fine","fire","firm","fish","five","flat","flow","food","foot","ford","form","fort","four","free","from","fuel","full","fund","gain","game","gate","gave","gear","gift","girl","give","glad","goal","gold","gone","good","gray","grew","grow","gulf","hair","half","hall","hand","hang","hard","hate","have","head","hear","heat","held","hell","help","here","hero","high","hill","hire","hold","hole","holy","home","hope","host","hour","huge","hung","hunt","hurt","idea","inch","into","iron","item","jack","jane","jazz","join","jump","just","keep","kept","kick","kill","kind","king","knee","knew","know","lack","lady","lake","land","lane","last","late","lead","left","less","life","lift","like","line","link","list","live","load","loan","lock","logo","long","look","lord","lose","loss","lost","loud","love","luck","made","mail","main","make","male","many","mark","mass","matt","meal","mean","meat","meet","menu","mile","milk","mill","mind","mine","miss","mode","mood","moon","more","most","move","much","must","name","near","neck","need","news","next","nice","nine","none","nose","note","okay","once","only","onto","open","oral","over","pace","pack","page","paid","pain","pair","palm","park","part","pass","past","path","peak","pick","pile","pink","pipe","plan","play","plot","plug","plus","poem","poet","poll","pool","poor","port","post","pull","pure","push","race","rail","rain","rank","rare","rate","read","real","rear","rely","rent","rest","rice","rich","ride","ring","rise","risk","road","rock","role","roof","room","root","rose","rule","rush","safe","said","sale","salt","same","sand","save","seat","seed","seek","seem","seen","sell","send","sent","sept","ship","shop","shot","show","shut","sick","side","sign","site","size","skin","slip","slow","snow","soft","soil","sold","sole","some","song","soon","sort","soul","soup","stay","step","stop","such","suit","sure","take","talk","tall","tank","tape","task","team","tell","tent","term","test","than","that","them","then","they","thin","this","thou","thus","tide","tidy","till","time","tiny","told","toll","tone","tony","took","tool","tour","town","tree","trip","true","tune","turn","twin","type","unit","upon","used","user","vary","vast","very","vice","view","vote","wage","wait","wake","walk","wall","want","ward","warm","wash","wave","ways","weak","wear","week","well","went","were","west","what","when","whom","wide","wife","wild","will","wind","wine","wing","wire","wise","wish","with","wood","word","wore","work","yard","yeah","year","your","zero","zone"]);

  const LETTERS = "AAAAAAAAAABBCCDDDDEEEEEEEEEEEEFFGGGHHIIIIIIIIJKLLLLMMNNNNNNOOOOOOPPQRRRRRSSSSSSTTTTTTUUUUUVVWXYYZ";
  let board = [], selected = [], found = new Set(), score = 0, time = 90, active = true, isDown = false;

  function init() {
    board = Array.from({length:36}, () => ({ char: randomChar(), isNew: true }));
    found.clear(); score = 0; time = 90; active = true;
    document.getElementById('wordList').innerHTML = '';
    updateUI(); 
    render(true);
    startTimer();
  }

  function randomChar() { return LETTERS[Math.floor(Math.random()*LETTERS.length)]; }

  function render(animateAll = false) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    board.forEach((tile, i) => {
      const btn = document.createElement('div');
      btn.className = 'tile';
      if (animateAll || tile.isNew) {
        btn.classList.add('falling');
        btn.style.animationDelay = (Math.random() * 0.2) + 's';
        tile.isNew = false; 
      }
      btn.textContent = tile.char;
      btn.dataset.index = i;

      // Selection logic
      btn.onpointerdown = (e) => { 
        if(!active) return;
        btn.releasePointerCapture(e.pointerId); // Allows enter events to trigger on other tiles
        isDown = true; 
        selected = [i]; 
        updateCurrentDisplay();
        highlightSelection();
      };
      btn.onpointerenter = () => { 
        if(isDown && !selected.includes(i)) {
          const last = selected[selected.length-1];
          if(isAdj(last, i)) { 
            selected.push(i); 
            updateCurrentDisplay();
            highlightSelection();
          }
        }
      };
      grid.appendChild(btn);
    });
  }

  function highlightSelection() {
    const tiles = document.querySelectorAll('.tile');
    tiles.forEach((t, idx) => {
      if (selected.includes(idx)) t.classList.add('selected');
      else t.classList.remove('selected');
    });
  }

  function updateCurrentDisplay() {
    const word = selected.map(i => board[i].char).join('');
    document.getElementById('currentWord').textContent = word || 'Connect 3+ Letters';
  }

  function isAdj(i1, i2) {
    const r1 = Math.floor(i1/6), c1 = i1%6, r2 = Math.floor(i2/6), c2 = i2%6;
    return Math.abs(r1-r2) <= 1 && Math.abs(c1-c2) <= 1;
  }

  function submit() {
    if (!active) return;
    const word = selected.map(i => board[i].char).join('').toLowerCase();
    
    if(word.length >= 3 && WORDS.has(word) && !found.has(word)) {
      found.add(word);
      score += 1;
      const li = document.createElement('li'); 
      li.textContent = word.toUpperCase();
      document.getElementById('wordList').prepend(li);
      
      selected.forEach(i => {
        board[i] = { char: randomChar(), isNew: true };
      });
      render(false); 
    }
    selected = []; isDown = false; updateUI(); updateCurrentDisplay(); highlightSelection();
  }

  function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('time').textContent = Math.floor(time/60) + ":" + (time%60).toString().padStart(2,'0');
  }

  function startTimer() {
    const clock = setInterval(() => {
      if(!active) { clearInterval(clock); return; }
      time--; updateUI();
      if(time <= 0) { 
        active = false; 
        alert("Game Over! You found " + score + " words."); 
      }
    }, 1000);
  }

  window.onpointerup = () => { if(isDown) submit(); };
  document.getElementById('clearBtn').onclick = () => { selected = []; highlightSelection(); updateCurrentDisplay(); };
  document.getElementById('shuffleBtn').onclick = () => { 
    board = board.sort(() => Math.random()-0.5); 
    render(true); 
  };
  document.getElementById('newGameBtn').onclick = () => location.reload();

  init();
</script>
</body>
</html>
