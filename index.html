<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Words Galore</title>
  <style>
    :root {
      --bg-a: #fff6b8;
      --bg-b: #ffd7ee;
      --bg-c: #d6f3ff;
      --ink: #25324a;
      --card: rgba(255,255,255,0.94);
      --pink: #ff5fa2;
      --blue: #49c7f2;
      --green: #22c878;
      --purple: #6e7ff2;
      --gold: #ffbf3f;
      --bad: #ef476f;
      --shadow: 0 8px 24px rgba(37,50,74,0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background: linear-gradient(135deg, #fffbe2, #ffe8f6, #e7f8ff);
      padding: 10px;
    }

    .wrap {
      max-width: 900px; /* Slimmed down width */
      margin: 0 auto;
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.8);
      backdrop-filter: blur(5px);
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    h1 { margin: 0; font-size: 1.8rem; } /* Smaller Title */

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .stat {
      background: #fff;
      border-radius: 12px;
      padding: 8px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .stat-label { font-size: 0.7rem; color: #6d7689; display: block; }
    .stat-value { font-size: 1.2rem; font-weight: 800; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 240px;
      gap: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      touch-action: none;
    }

    .tile {
      aspect-ratio: 1/1;
      border: 0;
      border-radius: 10px;
      background: #fff;
      font-size: 1.5rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tile.selected { background: var(--gold); color: #fff; }

    .current-box {
      margin: 10px 0;
      background: #eee;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      font-weight: 800;
      min-height: 45px;
    }

    .btn {
      border: 0;
      border-radius: 20px;
      padding: 10px 15px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
    }

    .btn-pink { background: var(--pink); }
    .btn-green { background: var(--green); }

    .word-list {
      list-style: none;
      padding: 0;
      max-height: 300px;
      overflow-y: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }

    .word-list li { background: #fff; padding: 5px; border-radius: 5px; font-size: 0.85rem; font-weight: bold; text-align: center;}

    @media (max-width: 600px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Words Galore</h1>
      <button class="btn btn-pink" id="newGameBtn">New Game</button>
    </div>

    <div class="stats">
      <div class="stat"><span class="stat-label">TIME</span><span id="timeDisplay" class="stat-value">1:30</span></div>
      <div class="stat"><span class="stat-label">WORDS</span><span id="wordsDisplay" class="stat-value">0</span></div>
      <div class="stat"><span class="stat-label">SCORE</span><span id="scoreDisplay" class="stat-value">0</span></div>
      <div class="stat"><span class="stat-label">BEST</span><span id="bestDisplay" class="stat-value">0</span></div>
    </div>

    <div class="layout">
      <section>
        <div class="current-box" id="currentWord">Select Letters</div>
        <div class="grid" id="grid"></div>
        <div style="margin-top:10px; display:flex; gap:10px;">
            <button class="btn btn-green" style="flex:1" id="submitBtn">Submit</button>
            <button class="btn btn-pink" style="flex:1" id="shuffleBtn">Shuffle</button>
        </div>
        <div id="message" style="margin-top:5px; font-weight:bold; height:20px; font-size:0.9rem;"></div>
      </section>

      <aside>
        <h3 style="margin-top:0">Found</h3>
        <ul class="word-list" id="wordList"></ul>
      </aside>
    </div>
  </div>

  <script>
    const BOARD_SIZE = 6;
    const ROUND_SECONDS = 90;
    let DICTIONARY = new Set();
    const LETTER_POOL = ['A','A','A','A','E','E','E','E','I','I','I','O','O','O','U','U','L','L','N','N','R','R','S','S','T','T','D','D','G','G','B','C','F','H','M','P','V','W','Y','K','J','X','Q','Z'];

    const gridEl = document.getElementById('grid');
    const currentWordEl = document.getElementById('currentWord');
    const messageEl = document.getElementById('message');
    const wordListEl = document.getElementById('wordList');
    const timeDisplayEl = document.getElementById('timeDisplay');
    const wordsDisplayEl = document.getElementById('wordsDisplay');
    const scoreDisplayEl = document.getElementById('scoreDisplay');
    const bestDisplayEl = document.getElementById('bestDisplay');
    const submitBtn = document.getElementById('submitBtn');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const newGameBtn = document.getElementById('newGameBtn');

    let board = [];
    let selectedPath = [];
    let foundWords = new Set();
    let score = 0;
    let timeLeft = ROUND_SECONDS;
    let timerId = null;
    let gameActive = false;
    let pointerDown = false;
    let bestWords = 0;

    async function loadWords() {
      // Expanded internal list - add as many as you like here
      const manualWords = ['able','about','above','accept','across','act','action','add','after','again','age','ago','agree','air','all','allow','almost','along','also','always','among','animal','another','answer','appear','area','around','arrive','art','ask','away','baby','back','ball','bank','base','bear','beat','beauty','because','become','been','before','begin','behind','believe','best','better','between','bird','black','blue','boat','body','book','both','bring','build','busy','call','came','care','carry','case','cause','center','change','check','child','city','class','clean','clear','close','cold','come','common','complete','contain','continue','cool','copy','cost','could','country','course','cover','create','dark','data','dead','deal','decide','deep','develop','different','done','door','down','draw','dream','drive','during','early','earth','easy','edge','enough','even','ever','every','example','face','fact','fall','family','farm','fast','father','feel','feet','field','figure','fill','final','find','fine','fire','first','fish','five','floor','follow','food','force','form','found','four','free','friend','from','front','full','game','gave','girl','give','gold','good','great','green','ground','group','grow','half','hand','happen','hard','have','head','hear','heat','help','here','high','home','horse','hour','house','however','idea','important','interest','into','join','just','keep','kind','king','knew','know','land','large','last','late','later','laugh','lead','learn','leave','left','less','letter','life','light','like','line','list','listen','little','live','long','look','love','made','make','many','mean','measure','might','mile','mind','miss','more','most','mother','move','much','must','name','near','need','never','next','night','note','nothing','number','often','once','only','open','order','other','outer','over','owner','page','paper','part','pass','past','people','perhaps','person','place','plan','play','point','power','press','problem','program','provide','question','quick','quite','rain','reach','read','ready','real','reason','receive','record','remember','rest','result','right','river','road','rock','room','said','same','school','second','seem','self','send','several','should','show','side','simple','since','small','some','something','soon','sound','south','space','stand','start','state','stay','step','still','stop','story','street','strong','study','such','system','take','talk','tell','term','than','that','their','them','then','there','these','they','thing','think','this','those','thought','three','through','time','together','told','toward','town','tree','turn','under','until','upon','usually','very','want','watch','water','week','well','went','were','what','when','where','which','while','white','will','with','word','work','world','would','write','year','young','zip','zoo','zoom','zig','zag','chic','cabin','oak','organic','sport','modern','scandi','vagus','nerve','wellness','awe','walk','mediterranean','photo','style','retro','vintage','blog','podcast','retyre'];
      DICTIONARY = new Set(manualWords.map(w => w.toLowerCase()));
      startNewGame();
    }

    function buildBoard() {
      board = Array.from({ length: BOARD_SIZE }, () =>
        Array.from({ length: BOARD_SIZE }, () => LETTER_POOL[Math.floor(Math.random() * LETTER_POOL.length)])
      );
    }

    function renderBoard() {
      gridEl.innerHTML = '';
      board.forEach((row, r) => {
        row.forEach((letter, c) => {
          const tile = document.createElement('button');
          tile.className = 'tile' + (selectedPath.some(p => p.r === r && p.c === c) ? ' selected' : '');
          tile.textContent = letter;
          tile.onpointerdown = () => { if(gameActive) { pointerDown = true; selectedPath = [{r,c}]; renderBoard(); }};
          tile.onpointerenter = () => { if(gameActive && pointerDown) { 
            if (!selectedPath.some(p => p.r === r && p.c === c)) {
                let last = selectedPath[selectedPath.length-1];
                if (Math.abs(last.r - r) <= 1 && Math.abs(last.c - c) <= 1) {
                    selectedPath.push({r,c}); renderBoard();
                }
            }
          }};
          gridEl.appendChild(tile);
        });
      });
      let word = selectedPath.map(p => board[p.r][p.c]).join('');
      currentWordEl.textContent = word || 'Select Letters';
    }

    function submitWord() {
      let word = selectedPath.map(p => board[p.r][p.c]).join('').toLowerCase();
      if (word.length >= 3 && DICTIONARY.has(word) && !foundWords.has(word)) {
        foundWords.add(word);
        score++;
        const li = document.createElement('li'); li.textContent = word.toUpperCase();
        wordListEl.prepend(li);
        messageEl.textContent = "Great!";
        wordsDisplayEl.textContent = foundWords.size;
        scoreDisplayEl.textContent = score;
      } else {
        messageEl.textContent = "Try again!";
      }
      selectedPath = [];
      renderBoard();
    }

    document.onpointerup = () => { if(pointerDown) { submitWord(); pointerDown = false; }};

    function startNewGame() {
      foundWords = new Set(); score = 0; timeLeft = 90; wordListEl.innerHTML = '';
      wordsDisplayEl.textContent = '0'; scoreDisplayEl.textContent = '0';
      gameActive = true; buildBoard(); renderBoard();
      if(timerId) clearInterval(timerId);
      timerId = setInterval(() => {
        timeLeft--; timeDisplayEl.textContent = `0:${timeLeft.toString().padStart(2,'0')}`;
        if(timeLeft <= 0) { clearInterval(timerId); gameActive = false; alert("Time's Up!"); }
      }, 1000);
    }

    shuffleBtn.onclick = () => { buildBoard(); renderBoard(); };
    newGameBtn.onclick = startNewGame;
    loadWords();
  </script>
</body>
</html>
