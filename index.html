<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Words Galore</title>

<style>
  :root {
    --ink: #25324a;
    --blue: #eef8ff;
    --accent: #6e7ff2;
    --gold: #ffbf3f;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #fffbe2, #ffe8f6, #e7f8ff);
    padding: 10px;
    touch-action: none; /* Prevents screen scrolling while playing */
  }

  .wrap {
    max-width: 600px;
    margin: auto;
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  h2 { margin: 0 0 15px; text-align: center; color: var(--ink); }

  .top {
    display: flex;
    justify-content: space-around;
    margin-bottom: 15px;
    font-size: 18px;
    font-weight: bold;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 8px;
    user-select: none;
  }

  .tile {
    aspect-ratio: 1;
    font-size: clamp(18px, 4vw, 24px);
    font-weight: 800;
    border-radius: 10px;
    border: none;
    background: var(--blue);
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }

  .selected {
    background: var(--gold) !important;
    color: white;
    transform: scale(1.05);
  }

  .current {
    margin: 15px 0;
    text-align: center;
    font-size: 22px;
    font-weight: 900;
    min-height: 30px;
    color: var(--accent);
    text-transform: uppercase;
  }

  .bottom {
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  button.control {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: var(--accent);
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  #list {
    margin-top: 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0;
    list-style: none;
    max-height: 100px;
    overflow-y: auto;
  }

  #list li {
    background: #f0f0f0;
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 14px;
    text-transform: uppercase;
  }
</style>
</head>

<body>

<div class="wrap">
  <h2>Words Galore</h2>

  <div class="top">
    <div>Time: <span id="time">90</span></div>
    <div>Words: <span id="count">0</span></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="current" id="currentWord">Select Letters</div>

  <div class="bottom">
    <button class="control" onclick="clearWord()">Clear</button>
    <button class="control" style="background:#ff5fa2" onclick="init()">New Game</button>
  </div>

  <ul id="list"></ul>
</div>

<script>
let WORDS = new Set();
const LETTERS = "AAAAAAAAABBCCDDDEEEEEEEEEFFGGHHIIIIIIJKLLMMNNNOOOOOOPPQRRRRSSSSTTTTTUUUVVWXYYZ";
let board=[], path=[], found=new Set();
let time=90, playing=false, isDragging = false;
let timerInterval;

// 1. IMPROVED LOADING: Ensure game waits for dictionary
async function loadWords() {
  try {
    const res = await fetch('words.txt');
    const text = await res.text();
    WORDS = new Set(
      text.split('\n')
          .map(w => w.trim().toLowerCase())
          .filter(w => w.length >= 3)
    );
    console.log("Dictionary loaded with " + WORDS.size + " words.");
    init(); // Start only after words are ready
  } catch (e) {
    console.error("Could not load words.txt. Check the file path!");
  }
}

function init() {
  clearInterval(timerInterval);
  board = Array.from({length:6},()=>Array.from({length:6},()=>LETTERS[Math.floor(Math.random()*LETTERS.length)]));
  found.clear();
  document.getElementById("list").innerHTML = "";
  time=90;
  playing=true;
  draw();
  startTimer();
}

function draw() {
  const gridEl = document.getElementById("grid");
  gridEl.innerHTML="";

  board.forEach((row,i)=>row.forEach((letter,j)=>{
    let btn = document.createElement("div");
    btn.className = "tile" + (path.some(p=>p.i===i && p.j===j) ? " selected" : "");
    btn.textContent = letter;

    btn.onpointerdown = (e) => {
      if(!playing) return;
      isDragging = true;
      btn.releasePointerCapture(e.pointerId); // Allows dragging over other tiles
      path = [{i,j}];
      draw();
    };

    btn.onpointerenter = () => {
      if(isDragging && playing) {
        let last = path[path.length-1];
        // Only add if adjacent and not already in path
        if(Math.abs(last.i-i)<=1 && Math.abs(last.j-j)<=1 && !path.some(p=>p.i===i && p.j===j)){
          path.push({i,j});
          draw();
        }
      }
    };

    gridEl.appendChild(btn);
  }));

  document.getElementById("currentWord").textContent = path.map(p=>board[p.i][p.j]).join("") || "Select Letters";
  document.getElementById("count").textContent = found.size;
}

// 2. GLOBAL UP: Submits the word regardless of where you let go
window.onpointerup = () => {
  if (isDragging) {
    isDragging = false;
    submitWord();
  }
};

function submitWord() {
  let word = path.map(p=>board[p.i][p.j]).join("").toLowerCase();

  if(word.length >= 3 && WORDS.has(word) && !found.has(word)){
    found.add(word);
    let li = document.createElement("li");
    li.textContent = word;
    document.getElementById("list").prepend(li);
    
    // 3. REFILL: Replace found letters with new ones
    path.forEach(p => {
      board[p.i][p.j] = LETTERS[Math.floor(Math.random()*LETTERS.length)];
    });
  }

  path = [];
  draw();
}

function clearWord(){
  path = [];
  draw();
}

function startTimer(){
  timerInterval = setInterval(()=>{
    if(!playing) return;
    time--;
    document.getElementById("time").textContent = time;

    if(time <= 0){
      clearInterval(timerInterval);
      playing = false;
      alert("Time's up! You found " + found.size + " words!");
    }
  }, 1000);
}

loadWords();
</script>

</body>
</html>
