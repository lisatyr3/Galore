<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Words Galore</title>
  <style>
    :root {
      --ink: #25324a;
      --pink: #ff5fa2;
      --gold: #ffbf3f;
      --green: #22c878;
      --blue: #6e7ff2;
    }
    * { box-sizing: border-box; touch-action: none; }
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg, #fffbe2, #ffe8f6, #e7f8ff);
      display: flex;
      justify-content: center;
      padding: 10px;
      height: 100vh;
      overflow: hidden;
    }
    .wrap {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .stats {
      display: flex;
      justify-content: space-around;
      background: white;
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      font-weight: bold;
      font-size: 1.1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      flex: 1;
      background: white;
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .tile {
      aspect-ratio: 1/1;
      background: #ffffff;
      border: 3px solid #e0e0e0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--ink);
      box-shadow: 0 4px 8px rgba(0,0,0,0.08);
      transition: all 0.2s ease;
      user-select: none;
    }
    .tile.active {
      background: var(--gold);
      color: white;
      border-color: #f3a61c;
      transform: scale(0.92);
      box-shadow: 0 6px 12px rgba(255, 191, 63, 0.4);
    }
    .current-word-display {
      background: white;
      padding: 14px;
      text-align: center;
      border-radius: 16px;
      font-size: 1.4rem;
      font-weight: 900;
      min-height: 54px;
      letter-spacing: 3px;
      color: var(--blue);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .controls { display: flex; gap: 12px; }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 16px;
      color: white;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.95); }
    .btn-new { background: var(--pink); }
    #msg { 
      text-align: center; 
      font-weight: bold; 
      font-size: 1.1rem;
      min-height: 28px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="stats">
    <div>Time: <span id="timer">1:30</span></div>
    <div>Words: <span id="wordCount">0</span></div>
  </div>
  <div class="current-word-display" id="tray">DRAG TO FORM WORDS</div>
  <div class="grid" id="grid"></div>
  <div id="msg"></div>
  <div class="controls">
    <button class="btn btn-new" onclick="resetGame()">New Game</button>
  </div>
</div>

<script>
// More balanced English letter frequencies (fewer excess vowels)
const TILES = [
  ...'E'.repeat(12), 'A'.repeat(9), 'I'.repeat(9), 'O'.repeat(8), 'U'.repeat(4),
  ...'R'.repeat(6), 'T'.repeat(6), 'N'.repeat(6), 'S'.repeat(6), 'L'.repeat(4),
  ...'D'.repeat(4), 'C'.repeat(3), 'M'.repeat(3), 'B'.repeat(2), 'H'.repeat(2),
  ...'G'.repeat(2), 'P'.repeat(2), 'F'.repeat(2), 'W'.repeat(2), 'Y'.repeat(2),
  'K','V','X','J','Q','Z'
];

let DICT = new Set();
let activePath = [];
let foundWords = new Set();
let isDragging = false;
let gameActive = false;
let timeLeft = 90;
let boardLetters = [];

async function loadDictionary() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/dwyl/english-words/master/words_alpha.txt');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    
    const text = await res.text();
    DICT = new Set(
      text.split('\n')
          .map(w => w.trim().toLowerCase())
          .filter(w => w.length >= 3 && /^[a-z]+$/.test(w))
    );
    console.log(`✅ Dictionary loaded! Total words: ${DICT.size}`);
    resetGame();
  } catch (e) {
    console.error("Dictionary load failed:", e);
    document.getElementById('msg').textContent = "Word list failed to load. Refresh page.";
    document.getElementById('msg').style.color = "red";
  }
}

function createBoard() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  boardLetters = [];
  
  for (let i = 0; i < 36; i++) {
    const letter = TILES[Math.floor(Math.random() * TILES.length)];
    boardLetters.push(letter);
    
    const div = document.createElement('div');
    div.className = 'tile';
    div.textContent = letter;
    div.dataset.index = i;
    grid.appendChild(div);
  }
}

function handleInteraction(e) {
  if (!gameActive || !isDragging) return;
 
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  const y = e.touches ? e.touches[0].clientY : e.clientY;
  const target = document.elementFromPoint(x, y);
  
  if (target && target.classList.contains('tile')) {
    const idx = parseInt(target.dataset.index);
    if (!activePath.includes(idx)) {
      if (activePath.length > 0) {
        const lastIdx = activePath[activePath.length - 1];
        const rowDiff = Math.abs(Math.floor(lastIdx/6) - Math.floor(idx/6));
        const colDiff = Math.abs((lastIdx % 6) - (idx % 6));
        if (rowDiff > 1 || colDiff > 1) return;
      }
      activePath.push(idx);
      target.classList.add('active');
      updateTray();
    }
  }
}

function updateTray() {
  const word = activePath.map(idx => boardLetters[idx]).join('');
  document.getElementById('tray').textContent = word;
}

function submitWord() {
  const word = document.getElementById('tray').textContent.toLowerCase().trim();
  const msg = document.getElementById('msg');
 
  if (word.length < 3) {
    cleanup();
    return;
  }

  if (DICT.has(word) && !foundWords.has(word)) {
    foundWords.add(word);
    document.getElementById('wordCount').textContent = foundWords.size;
    
    msg.textContent = `NICE! + ${word.toUpperCase()}`;
    msg.style.color = "var(--green)";

    // Refill used tiles with fresh letters
    activePath.forEach(idx => {
      boardLetters[idx] = TILES[Math.floor(Math.random() * TILES.length)];
      const tile = document.querySelector(`[data-index="${idx}"]`);
      if (tile) tile.textContent = boardLetters[idx];
    });
  } else {
    msg.textContent = foundWords.has(word) ? "ALREADY FOUND" : "NOT IN LIST";
    msg.style.color = "var(--pink)";
  }
 
  cleanup();
}

function cleanup() {
  document.querySelectorAll('.tile').forEach(t => t.classList.remove('active'));
  activePath = [];
  document.getElementById('tray').textContent = "DRAG TO FORM WORDS";
  setTimeout(() => { document.getElementById('msg').textContent = ""; }, 1600);
}

// Event listeners
window.addEventListener('mousedown', () => isDragging = true);
window.addEventListener('touchstart', () => isDragging = true);
window.addEventListener('mousemove', handleInteraction);
window.addEventListener('touchmove', handleInteraction);
window.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; submitWord(); } });
window.addEventListener('touchend', () => { if (isDragging) { isDragging = false; submitWord(); } });

function resetGame() {
  foundWords.clear();
  document.getElementById('wordCount').textContent = '0';
  timeLeft = 90;
  gameActive = true;
  createBoard();
  startTimer();
}

function startTimer() {
  const timerDisplay = document.getElementById('timer');
  const id = setInterval(() => {
    timeLeft--;
    let m = Math.floor(timeLeft / 60);
    let s = timeLeft % 60;
    timerDisplay.textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
    if (timeLeft <= 0 || !gameActive) {
      clearInterval(id);
      gameActive = false;
      alert(`Time's up! You found ${foundWords.size} words.`);
    }
  }, 1000);
}

// Start the game
loadDictionary();
</script>
</body>
</html>
