<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Words Galore</title>
<style>
body { margin:0; font-family:Arial; background:#ffe6f6; }
.wrap { max-width:900px; margin:auto; padding:10px; }
.grid { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
.tile { aspect-ratio:1; font-size:22px; font-weight:bold; border-radius:10px; border:none; }
.selected { background:gold; }
.top { display:flex; justify-content:space-between; font-weight:bold; margin-bottom:10px; }
.current { text-align:center; font-size:20px; margin:10px 0; }
</style>
</head>
<body>
<div class="wrap">
<div class="top">
<div id="time">90</div>
<div id="words">0</div>
</div>
<div class="grid" id="grid"></div>
<div class="current" id="current"></div>
</div>
<script>
const SIZE=6;
const TIME=90;
let board=[],path=[],words=new Set(),time=TIME,active=true;
const dict=new Set(["one","two","moo","cat","dog","sun","fun","run","hat","map","pen","cup"]);
function rand(){return "ABCDEFGHIJKLMNOPQRSTUVWXYZ"[Math.floor(Math.random()*26)];}
function build(){board=Array.from({length:SIZE},()=>Array.from({length:SIZE},rand));}
function draw(){grid.innerHTML="";
board.forEach((r,i)=>r.forEach((c,j)=>{
let b=document.createElement("button");
b.className="tile"+(path.some(p=>p.i==i&&p.j==j)?" selected":"");
b.textContent=c;
b.onpointerdown=()=>{path=[{i,j}];draw();};
b.onpointerenter=e=>{if(e.buttons){let last=path[path.length-1];
if(Math.abs(last.i-i)<=1&&Math.abs(last.j-j)<=1&&!path.some(p=>p.i==i&&p.j==j)){
path.push({i,j});draw();}}};
b.onpointerup=submit;
grid.appendChild(b);
}));
current.textContent=path.map(p=>board[p.i][p.j]).join("");
}
function submit(){let w=current.textContent.toLowerCase();
if(w.length>=3&&!words.has(w)){
words.add(w);
wordsDisplay();}
path=[];draw();}
function wordsDisplay(){wordsEl.textContent=words.size;}
function tick(){if(!active)return;
time--;timeEl.textContent=time;
if(time<=0){active=false;alert("You got "+words.size+" words!");}}
let grid=document.getElementById("grid"),current=document.getElementById("current"),timeEl=document.getElementById("time"),wordsEl=document.getElementById("words");
build();draw();setInterval(tick,1000);
</script>
</body>
</html>
