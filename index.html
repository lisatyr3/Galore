<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Words Galore</title>
  <style>
    :root {
      --ink: #25324a; --pink: #ff5fa2; --blue: #49c7f2; 
      --green: #22c878; --purple: #6e7ff2; --gold: #ffbf3f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      color: var(--ink);
      background: #fdfcf0;
      padding: 8px;
    }

    .wrap {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    h1 { margin: 0; font-size: 1.4rem; color: var(--purple); }

    .stats { display: flex; gap: 8px; }
    .stat {
      background: #f0f4f8;
      padding: 4px 10px;
      border-radius: 8px;
      text-align: center;
      min-width: 60px;
    }
    .stat-label { display: block; font-size: 0.6rem; text-transform: uppercase; color: #6d7689; }
    .stat-value { font-weight: 800; font-size: 1.1rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      touch-action: none;
    }

    .tile {
      aspect-ratio: 1 / 1;
      border: 0;
      border-radius: 10px;
      background: #f8f9fa;
      font-size: 1.4rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 -3px 0 rgba(0,0,0,0.1);
      cursor: pointer;
    }

    .falling {
      animation: fallBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) backwards;
    }

    @keyframes fallBounce {
      0% { transform: translateY(-30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }

    .tile.selected {
      background: var(--gold);
      color: white;
      transform: scale(0.95);
      box-shadow: none;
    }

    .current-box {
      margin: 10px 0;
      background: #f1f1f1;
      border-radius: 8px;
      padding: 8px;
      font-size: 1.1rem;
      font-weight: 800;
      text-align: center;
      min-height: 40px;
      color: var(--purple);
    }

    .actions { display: flex; gap: 6px; }
    .btn {
      flex: 1;
      border: 0;
      border-radius: 8px;
      padding: 10px 5px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .btn-purple { background: var(--purple); }
    .btn-blue { background: var(--blue); }
    .btn-pink { background: var(--pink); }

    .word-area {
      margin-top: 10px;
      border-top: 1px solid #eee;
      padding-top: 8px;
    }

    .word-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      list-style: none;
      padding: 0;
      margin: 5px 0 0;
      max-height: 80px;
      overflow-y: auto;
    }

    .word-list li {
      background: #eef2f5;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="hero">
    <h1>Words Galore</h1>
    <div class="stats">
      <div class="stat"><span class="stat-label">Time</span><span class="stat-value" id="time">1:30</span></div>
      <div class="stat"><span class="stat-label">Words</span><span class="stat-value" id="score">0</span></div>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  
  <div class="current-box" id="currentWord">Connect 3+ Letters</div>

  <div class="actions">
    <button class="btn btn-purple" id="clearBtn">Clear</button>
    <button class="btn btn-blue" id="shuffleBtn">Shuffle</button>
    <button class="btn btn-pink" id="newGameBtn">New Game</button>
  </div>

  <div class="word-area">
    <div style="font-size: 0.7rem; font-weight: 800; color: #999; text-transform: uppercase;">Words Found</div>
    <ul class="word-list" id="wordList"></ul>
  </div>
</div>

<script>
  // Expanded dictionary with "ONE", "MOO", "LONE", "TAIL", etc.
  const WORDS = new Set(["moo","one","lone","tail","ace","act","add","age","ago","aid","aim","air","ale","all","and","ant","any","ape","app","apt","arc","are","arm","art","ash","ask","ate","awe","axe","bad","bag","ban","bar","bat","bay","bed","bee","beg","bet","bid","big","bin","bit","boa","bob","bog","boo","bow","boy","bra","bud","bug","bum","bun","bus","but","buy","bye","cab","can","cap","car","cat","caw","cob","cod","cog","con","coo","cop","cot","cow","coy","cry","cub","cue","cup","cut","dab","dad","dam","day","den","dew","did","die","dig","dim","din","dip","doc","dog","don","dot","dry","dub","duo","dye","ear","eat","ebb","eco","eel","egg","ego","eke","elf","elk","elm","end","eon","era","ere","erg","err","eve","eye","fad","fag","fan","far","fat","fed","fee","fen","few","fey","fez","fib","fie","fig","fin","fir","fit","fix","fly","fob","foe","fog","for","fox","fro","fry","fun","fur","gab","gad","gag","gal","gam","gap","gar","gas","gay","gel","gem","get","gig","gin","gip","glad","gob","god","goo","got","gum","gun","gut","guy","gym","had","hag","ham","han","has","hat","hay","hem","hen","her","hey","hic","hid","hie","him","hin","hip","his","hit","hob","hod","hog","hop","hot","how","hoy","hub","hue","hug","hum","hun","hut","ice","icy","ids","iff","ill","imp","ink","inn","ion","ire","irk","its","ivy","jab","jag","jam","jar","jaw","jay","jet","jib","jig","job","jog","jot","joy","jug","jut","kea","keg","ken","key","kid","kin","kit","koa","lab","lad","lag","lam","lap","lar","las","lat","law","lax","lay","lea","led","lee","leg","lei","lek","let","leu","lev","ley","lib","lid","lie","lin","lip","lit","lob","log","loo","lop","lot","low","lox","lug","lye","mac","mad","mae","mag","man","map","mar","mas","mat","maw","max","may","med","meg","men","met","mew","mid","mig","mil","min","mir","mix","mob","mod","mog","mol","mom","mon","mop","mor","mot","mow","mud","mug","mum","mun","mus","mut","nab","nae","nag","nah","nam","nan","nap","nay","neb","nee","net","new","nib","nil","nim","nip","nit","nix","nob","nod","nog","noh","nom","non","nor","nos","not","now","nub","nun","nus","nut","oak","oar","oat","oba","obe","obi","odd","ode","ods","oes","off","oft","ohm","oho","ohs","oil","oka","oke","old","ole","oma","oms","ono","ons","ony","opa","ope","ops","opt","ora","orb","ore","ors","ort","ose","oud","our","out","ova","owe","owl","own","owt","oxo","oxy","pac","pad","pah","pal","pan","pap","par","pas","pat","paw","pax","pay","pea","pec","fed","pee","peg","pen","pep","per","pes","pet","pew","phi","pht","pia","pic","pie","pig","pin","pip","pis","pit","piu","pix","ply","pod","poh","poi","pol","pom","poo","pop","pot","pow","pox","pry","pub","pud","pug","pun","pup","pus","put","pye","pyx","qat","qua","rad","rag","rah","rai","raj","ram","ran","rap","ras","rat","raw","ray","reb","red","ree","ref","reg","rei","rem","rep","res","rev","rex","rhea","rho","ria","rib","rid","rif","rig","rim","rin","rip","rob","roc","rod","roe","rom","rot","row","rub","rue","rug","rum","run","rut","rya","rye","sac","sad","sae","sag","sal","sap","sat","sau","saw","sax","say","sea","sec","see","seg","sei","sel","sen","set","sew","sex","sha","she","shy","sib","sic","sim","sin","sip","sir","sis","sit","six","ski","sky","sly","sob","sod","sol","son","sop","sot","sow","sox","soy","spa","spy","sub","sue","sum","sun","sup","sus","tab","tad","tag","taj","tam","tan","tap","tar","tas","tat","tau","taw","tax","tea","ted","tee","ten","tet","tew","the","tho","thy","tic","tie","til","tin","tip","tis","tit","toe","tog","tom","ton","too","top","tor","tot","tow","toy","try","tsk","tub","tug","tui","tun","tup","tut","tux","twa","two","tye","udo","ugh","uke","ulu","umm","ump","ums","uni","uns","upo","ups","urb","urd","ure","urn","use","uta","ute","uts","vac","van","var","vas","vat","vau","vav","vaw","vee","veg","vet","vex","via","vid","vie","vig","vim","vin","vis","voe","vow","vox","vug","wad","wae","wag","wan","wap","war","was","wat","waw","wax","way","web","wed","wee","wen","wet","wha","who","why","wig","win","wis","wit","wiz","woe","wok","won","woo","wos","wot","wow","wry","wud","wye","wyn","xis","yad","yae","yag","yah","yak","yam","yap","yar","yaw","yay","yea","yeh","yen","yep","yes","yet","yew","yid","yin","yip","yob","yod","yok","yon","you","yow","yug","yuk","yum","yup","zag","zap","zas","zax","zed","zee","zek","zen","zig","zin","zip","zit","zoa","zoo","zuz"]);

  const LETTERS = "AAAAAAAAAABBCCDDDDEEEEEEEEEEEEFFGGGHHIIIIIIIIJKLLLLMMNNNNNNOOOOOOPPQRRRRRSSSSSSTTTTTTUUUUUVVWXYYZ";
  let board = [], selected = [], found = new Set(), score = 0, time = 90, active = true, isDown = false;

  function init() {
    board = Array.from({length:36}, () => ({ char: randomChar(), key: Math.random() }));
    found.clear(); score = 0; time = 90; active = true;
    document.getElementById('wordList').innerHTML = '';
    updateUI(); 
    render(true);
    startTimer();
  }

  function randomChar() { return LETTERS[Math.floor(Math.random()*LETTERS.length)]; }

  function render(animateAll = false) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    board.forEach((tile, i) => {
      const btn = document.createElement('button');
      btn.className = 'tile';
      if (selected.includes(i)) btn.classList.add('selected');
      if (animateAll || tile.isNew) {
        btn.classList.add('falling');
        btn.style.animationDelay = (Math.random() * 0.2) + 's';
        tile.isNew = false; 
      }
      btn.textContent = tile.char;

      btn.onpointerdown = (e) => { 
        if(!active) return; 
        isDown = true; 
        selected = [i]; 
        updateCurrentDisplay();
        highlightSelection();
      };
      btn.onpointerenter = () => { 
        if(isDown && !selected.includes(i)) {
          const last = selected[selected.length-1];
          if(isAdj(last, i)) { 
            selected.push(i); 
            updateCurrentDisplay();
            highlightSelection();
          }
        }
      };
      grid.appendChild(btn);
    });
  }

  function highlightSelection() {
    const tiles = document.querySelectorAll('.tile');
    tiles.forEach((t, idx) => {
      if (selected.includes(idx)) t.classList.add('selected');
      else t.classList.remove('selected');
    });
  }

  function updateCurrentDisplay() {
    const word = selected.map(i => board[i].char).join('');
    document.getElementById('currentWord').textContent = word || 'Connect 3+ Letters';
  }

  function isAdj(i1, i2) {
    const r1 = Math.floor(i1/6), c1 = i1%6, r2 = Math.floor(i2/6), c2 = i2%6;
    return Math.abs(r1-r2) <= 1 && Math.abs(c1-c2) <= 1;
  }

  function submit() {
    if (!active) return;
    const word = selected.map(i => board[i].char).join('').toLowerCase();
    
    if(word.length >= 3 && WORDS.has(word) && !found.has(word)) {
      found.add(word);
      score += 1; // 1 point per word found
      const li = document.createElement('li'); 
      li.textContent = word.toUpperCase();
      document.getElementById('wordList').prepend(li);
      
      selected.forEach(i => {
        board[i] = { char: randomChar(), key: Math.random(), isNew: true };
      });
      render(false); 
    }
    selected = []; isDown = false; updateUI(); updateCurrentDisplay(); highlightSelection();
  }

  function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('time').textContent = Math.floor(time/60) + ":" + (time%60).toString().padStart(2,'0');
  }

  function startTimer() {
    const clock = setInterval(() => {
      if(!active) { clearInterval(clock); return; }
      time--; updateUI();
      if(time <= 0) { 
        active = false; 
        alert("Game Over! You found " + score + " words."); 
      }
    }, 1000);
  }

  window.onpointerup = () => { if(isDown) submit(); };
  document.getElementById('clearBtn').onclick = () => { selected = []; highlightSelection(); updateCurrentDisplay(); };
  document.getElementById('shuffleBtn').onclick = () => { 
    board = board.sort(() => Math.random()-0.5); 
    render(true); 
  };
  document.getElementById('newGameBtn').onclick = () => init();

  init();
</script>
</body>
</html>
