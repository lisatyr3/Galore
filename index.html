<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Words Galore</title>
  <style>
    :root {
      --bg-a: #fff6b8; --bg-b: #ffd7ee; --bg-c: #d6f3ff;
      --ink: #25324a; --card: rgba(255,255,255,0.94);
      --pink: #ff5fa2; --blue: #49c7f2; --green: #22c878;
      --purple: #6e7ff2; --gold: #ffbf3f; --bad: #ef476f;
      --shadow: 0 16px 36px rgba(37,50,74,0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0; font-family: Arial, sans-serif; color: var(--ink);
      min-height: 100vh; padding: 18px; touch-action: none;
      background: radial-gradient(circle at 10% 10%, var(--bg-b), transparent 24%),
                  radial-gradient(circle at 90% 14%, var(--bg-c), transparent 24%),
                  linear-gradient(135deg, #fffbe2, #ffe8f6 50%, #e7f8ff);
    }

    .wrap {
      max-width: 1240px; margin: 0 auto; background: var(--card);
      border-radius: 28px; box-shadow: var(--shadow); padding: 24px;
      border: 1px solid rgba(255,255,255,0.85); backdrop-filter: blur(5px);
    }

    .hero { display: flex; flex-wrap: wrap; gap: 18px; align-items: flex-end; justify-content: space-between; margin-bottom: 18px; }
    h1 { margin: 0; font-size: clamp(2.6rem, 5vw, 4rem); line-height: 1; }
    .stats { display: grid; grid-template-columns: repeat(3, minmax(130px, 1fr)); gap: 14px; width: 100%; }
    .stat { background: rgba(255,255,255,0.92); border-radius: 22px; padding: 16px 18px; text-align: center; box-shadow: 0 10px 22px rgba(37,50,74,0.08); }
    .stat-label { display: block; font-size: 0.84rem; text-transform: uppercase; color: #6d7689; margin-bottom: 6px; }
    .stat-value { display: block; font-size: 2rem; font-weight: 800; }

    .layout { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 22px; align-items: start; }
    .panel { background: rgba(255,255,255,0.92); border-radius: 26px; box-shadow: 0 10px 24px rgba(37,50,74,0.08); padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; user-select: none; }
    
    .tile {
      aspect-ratio: 1 / 1; border: 0; border-radius: 18px;
      background: linear-gradient(180deg, #ffffff, #eef8ff);
      font-size: clamp(1.45rem, 2.2vw, 2rem); font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 10px 18px rgba(73,199,242,0.16); transition: all 0.14s ease;
      cursor: pointer;
    }

    .tile.selected { background: var(--gold); transform: scale(1.05); color: white; }
    .current-box { margin-top: 16px; background: #f1f1f1; border-radius: 20px; min-height: 70px; display: flex; align-items: center; justify-content: center; font-size: 1.7rem; font-weight: 900; text-transform: uppercase; }
    
    .actions { margin-top: 14px; display: flex; gap: 12px; }
    .btn { border: 0; border-radius: 999px; padding: 14px 20px; font-weight: 800; color: #fff; cursor: pointer; }
    .btn-green { background: var(--green); } .btn-purple { background: var(--purple); } .btn-blue { background: var(--blue); } .btn-pink { background: var(--pink); }

    .word-list { list-style: none; padding: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 400px; overflow: auto; }
    .word-list li { background: #fff; padding: 10px; border-radius: 10px; font-weight: 800; text-transform: uppercase; border: 1px solid #eee; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
    .overlay.show { display: flex; }
    .modal { background: white; padding: 40px; border-radius: 30px; text-align: center; }

    @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Words Galore</h1>
      <div class="stats">
        <div class="stat"><span class="stat-label">Time</span><span class="stat-value" id="timeDisplay">1:30</span></div>
        <div class="stat"><span class="stat-label">Words Found</span><span class="stat-value" id="wordsDisplay">0</span></div>
        <div class="stat"><span class="stat-label">Best</span><span class="stat-value" id="bestDisplay">0</span></div>
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="grid" id="grid"></div>
        <div class="current-box" id="currentWord">Select Letters</div>
        <div class="actions">
          <button class="btn btn-green" id="submitBtn">Submit Word</button>
          <button class="btn btn-purple" id="clearBtn">Clear</button>
          <button class="btn btn-blue" id="shuffleBtn">Shuffle</button>
          <button class="btn btn-pink" id="newGameBtn">New Game</button>
        </div>
      </section>

      <aside class="panel">
        <h2>Words Found</h2>
        <ul class="word-list" id="wordList"></ul>
      </aside>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2 id="finalWords">Game Over!</h2>
      <button class="btn btn-pink" id="playAgainBtn">Play Again</button>
    </div>
  </div>

      "adore","adorn","airy","align","alley","amuse","arena","arise","attic","audio","autumn","bacon","balm","beacon","beige","berry","bistro","blossom","blouse","bonnet","brisk","buyer","camera","candle","canyon","captain","caramel","careful","carrot","castle","casual","centered","cherry","cinnamon","classic","cleaner","closet","coastal","cobalt","coconut","comfy","crystal","dahlia","dapper","denim","dreamy","drizzle","dune","easel","elegant","ember","emerald","estate","evening","fabric","feather","fiesta","filter","floral","folder","gardenia","glam","glimmer","gloss","golden","graceful","grapevine","harvest","hazelnut","heather","horizon","hyacinth","indigo","inkwell","ivory","jasmine","journey","joyful","kindle","lavender","leather","legacy","leisure","lilac","lively","lotion","lotus","lovely","luster","marble","meadow","melody","merlot","morning","mossy","muffin","natural","nectar","nestle","notebook","oatmilk","orchid","outfit","paddle","paisley","peachy","petal","pewter","picnic","polka","ponder","pretty","primrose","pumpkin","quartz","quicker","quietly","rattan","reader","rosebud","rosy","ruffle","sandal","satin","scarlet","scenic","shadow","shimmer","shopper","silky","sketch","soften","sparkle","springtime","sunbeam","sunny","sweater","tailor","teacup","thistle","thrift","tidy","timeless","toffee","topaz","travel","tulip","turquoise","uplift","useful","vanilla","velour","violet","vintage","walnut","warmth","weekend","whimsy","willow","woven","yearly","zesty"
    ]);

    const LETTER_POOL = "AAAAAAAAAABBCCDDDDEEEEEEEEEEEEFFGGGHHIIIIIIIIJKLLLLMMNNNNNNOOOOOOPPQRRRRRSSSSSSTTTTTTUUUUUVVWXYYZ".split("");
    let board = [], selectedPath = [], foundWords = new Set(), timeLeft = 90, timerId = null, gameActive = true, isDragging = false;
    let bestCount = parseInt(localStorage.getItem('WordsGaloreBestV6') || '0');

    function init() {
      board = Array.from({length:6}, () => Array.from({length:6}, () => LETTER_POOL[Math.floor(Math.random()*LETTER_POOL.length)]));
      foundWords.clear(); timeLeft = 90; gameActive = true; selectedPath = [];
      document.getElementById('wordList').innerHTML = '';
      document.getElementById('bestDisplay').textContent = bestCount;
      render(); startTimer();
    }

    function render() {
      const grid = document.getElementById('grid'); grid.innerHTML = '';
      board.forEach((rowArr, r) => rowArr.forEach((letter, c) => {
        const btn = document.createElement('div'); btn.className = 'tile';
        if (selectedPath.some(p => p.r === r && p.c === c)) btn.classList.add('selected');
        btn.textContent = letter;
        btn.onpointerdown = () => { if(!gameActive) return; isDragging = true; selectedPath = [{r, c}]; render(); };
        btn.onpointerenter = () => { if(isDragging) { addNode(r,c); } };
        grid.appendChild(btn);
      }));
      const word = selectedPath.map(p => board[p.r][p.c]).join('');
      document.getElementById('currentWord').textContent = word || 'Select Letters';
      document.getElementById('wordsDisplay').textContent = foundWords.size;
    }

    function addNode(r, c) {
      if (selectedPath.some(p => p.r === r && p.c === c)) {
        if (selectedPath.length > 1 && selectedPath[selectedPath.length-2].r === r && selectedPath[selectedPath.length-2].c === c) {
          selectedPath.pop(); render();
        }
        return;
      }
      const last = selectedPath[selectedPath.length-1];
      if (Math.abs(last.r - r) <= 1 && Math.abs(last.c - c) <= 1) {
        selectedPath.push({r, c}); render();
      }
    }

    function submit() {
      if (!gameActive) return;
      const word = selectedPath.map(p => board[p.r][p.c]).join('').toLowerCase();
      if (word.length >= 3 && WORDS.has(word) && !foundWords.has(word)) {
        foundWords.add(word);
        const li = document.createElement('li'); li.textContent = word;
        document.getElementById('wordList').prepend(li);
        selectedPath.forEach(p => board[p.r][p.c] = LETTER_POOL[Math.floor(Math.random()*LETTER_POOL.length)]);
      }
      selectedPath = []; isDragging = false; render();
    }

    function startTimer() {
      clearInterval(timerId);
      timerId = setInterval(() => {
        timeLeft--;
        document.getElementById('timeDisplay').textContent = `0:${timeLeft.toString().padStart(2,'0')}`;
        if(timeLeft <= 0) {
          gameActive = false; clearInterval(timerId);
          if(foundWords.size > bestCount) { bestCount = foundWords.size; localStorage.setItem('WordsGaloreBestV6', bestCount); }
          document.getElementById('finalWords').textContent = `You found ${foundWords.size} words!`;
          document.getElementById('overlay').classList.add('show');
        }
      }, 1000);
    }

    window.onpointerup = () => { if(isDragging) submit(); };
    document.getElementById('clearBtn').onclick = () => { selectedPath = []; render(); };
    document.getElementById('shuffleBtn').onclick = () => {
      const letters = board.flat().sort(() => Math.random()-0.5);
      let i = 0; board = board.map(row => row.map(() => letters[i++]));
      render();
    };
    document.getElementById('newGameBtn').onclick = () => location.reload();
    document.getElementById('playAgainBtn').onclick = () => location.reload();
    document.getElementById('submitBtn').onclick = submit;

    init();
  </script>
</body>
</html>
