<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Words Galore</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#fffbe2,#ffe8f6,#e7f8ff);
  padding:10px;
}

.wrap {
  max-width:900px;
  margin:auto;
  background:white;
  border-radius:16px;
  padding:15px;
}

h2 { margin:5px 0 10px; }

.top {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-size:14px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
}

.tile {
  aspect-ratio:1;
  font-size:22px;
  font-weight:bold;
  border-radius:10px;
  border:none;
  background:#eef8ff;
  color:#25324a;
}

.selected {
  background:gold;
  color:#000;
}

.current {
  margin-top:8px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  min-height:24px;
}

.bottom {
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  align-items:center;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:14px;
  background:#6e7ff2;
  color:white;
}

ul {
  margin-top:10px;
  max-height:150px;
  overflow:auto;
  font-size:13px;
}
</style>
</head>

<body>

<div class="wrap">

<h2>Words Galore</h2>

<div class="top">
  <div>Time: <span id="time">90</span></div>
  <div>Words: <span id="count">0</span></div>
</div>

<div class="grid" id="grid"></div>

<div class="current" id="currentWord">Select Letters</div>

<div class="bottom">
  <button onclick="clearWord()">Clear</button>
</div>

<ul id="list"></ul>

</div>

<script>

let WORDS = new Set();

async function loadWords() {
  const res = await fetch('words.txt');
  const text = await res.text();

  WORDS = new Set(
    text.split('\n')
        .map(w => w.trim().toLowerCase())
        .filter(w => w.length >= 3)
  );
}

const LETTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let board=[], path=[], found=new Set();
let time=90, playing=true;

function init() {
  board = Array.from({length:6},()=>Array.from({length:6},()=>LETTERS[Math.floor(Math.random()*26)]));
  found.clear();
  time=90;
  playing=true;
  draw();
  startTimer();
}

function draw() {
  grid.innerHTML="";

  board.forEach((row,i)=>row.forEach((letter,j)=>{
    let btn=document.createElement("button");
    btn.className="tile"+(path.some(p=>p.i===i && p.j===j)?" selected":"");
    btn.textContent=letter;

    btn.onpointerdown=()=>{
      path=[{i,j}];
      draw();
    };

    btn.onpointerenter=(e)=>{
      if(e.buttons){
        let last=path[path.length-1];
        if(Math.abs(last.i-i)<=1 && Math.abs(last.j-j)<=1 &&
           !path.some(p=>p.i===i && p.j===j)){
          path.push({i,j});
          draw();
        }
      }
    };

    btn.onpointerup=()=>{
      submitWord();
    };

    grid.appendChild(btn);
  }));

  currentWord.textContent = path.map(p=>board[p.i][p.j]).join("") || "Select Letters";
  count.textContent = found.size;
}

function submitWord() {
  let word = path.map(p=>board[p.i][p.j]).join("").toLowerCase();

  if(word.length >= 3 && WORDS.has(word) && !found.has(word)){
    found.add(word);

    let li=document.createElement("li");
    li.textContent=word;
    list.appendChild(li);
  }

  path=[];
  draw();
}

function clearWord(){
  path=[];
  draw();
}

function startTimer(){
  let t=setInterval(()=>{
    time--;
    document.getElementById("time").textContent=time;

    if(time<=0){
      clearInterval(t);
      playing=false;
      alert("Time's up! You found "+found.size+" words!");
    }
  },1000);
}

loadWords().then(()=>{
  init();
});

</script>

</body>
</html>
