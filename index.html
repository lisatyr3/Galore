<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Words Galore</title>
  <style>
    :root {
      --ink: #25324a;
      --card: rgba(255,255,255,0.96);
      --pink: #ff5fa2;
      --green: #22c878;
      --gold: #ffbf3f;
      --shadow: 0 8px 24px rgba(37,50,74,0.12);
    }

    * { box-sizing: border-box; touch-action: none; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      height: 100vh;
      background: linear-gradient(135deg, #fffbe2, #ffe8f6, #e7f8ff);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .wrap {
      width: 95vw;
      max-width: 800px;
      height: 95vh;
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 15px;
      display: flex;
      flex-direction: column;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    h1 { margin: 0; font-size: 1.4rem; color: var(--pink); }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 15px;
    }

    .stat {
      background: #fff;
      border-radius: 12px;
      padding: 8px;
      text-align: center;
      border: 1px solid #f0f0f0;
    }

    .stat-label { font-size: 0.6rem; color: #6d7689; display: block; text-transform: uppercase; font-weight: bold; }
    .stat-value { font-size: 1.1rem; font-weight: 800; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 15px;
      flex: 1;
      min-height: 0;
    }

    .game-area {
      display: flex;
      flex-direction: column;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      user-select: none;
      flex: 1;
    }

    .tile {
      aspect-ratio: 1/1;
      border-radius: 10px;
      background: #fff;
      font-size: 1.5rem;
      font-weight: 800;
      box-shadow: 0 4px 0px #e0e0e0;
      border: 2px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .tile.selected { 
      background: var(--gold); 
      color: #fff; 
      border-color: #f3a61c;
      box-shadow: 0 2px 0px #f3a61c;
      transform: translateY(2px);
    }

    .current-box {
      margin-bottom: 10px;
      background: #f8f9fa;
      border-radius: 10px;
      padding: 10px;
      text-align: center;
      font-weight: 800;
      min-height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      letter-spacing: 3px;
      border: 2px dashed #dee2e6;
      color: var(--purple);
    }

    .btn {
      border: 0;
      border-radius: 12px;
      padding: 10px 15px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
    }

    .btn-pink { background: var(--pink); }

    .word-list-container {
      display: flex;
      flex-direction: column;
      background: #fdfdfd;
      border-radius: 12px;
      padding: 10px;
      border: 1px solid #f0f0f0;
    }

    .word-list {
      list-style: none;
      padding: 0;
      margin: 0;
      overflow-y: auto;
      flex: 1;
    }

    .word-list li { 
      padding: 6px;
      border-bottom: 1px solid #eee;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--ink);
    }

    #message { 
      font-weight: 900; 
      height: 24px; 
      font-size: 1rem; 
      text-align: center; 
      margin-top: 10px;
      text-transform: uppercase;
    }

    @media (max-width: 600px) {
      .layout { grid-template-columns: 1fr; grid-template-rows: 1fr 120px; }
      .wrap { height: 98vh; width: 100vw; border-radius: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Words Galore</h1>
      <button class="btn btn-pink" onclick="startNewGame()">Reset</button>
    </div>

    <div class="stats">
      <div class="stat"><span class="stat-label">Time</span><span id="timeDisplay" class="stat-value">1:30</span></div>
      <div class="stat"><span class="stat-label">Words</span><span id="wordsDisplay" class="stat-value">0</span></div>
      <div class="stat"><span class="stat-label">Score</span><span id="scoreDisplay" class="stat-value">0</span></div>
      <div class="stat"><span class="stat-label">Best</span><span id="bestDisplay" class="stat-value">0</span></div>
    </div>

    <div class="layout">
      <div class="game-area">
        <div class="current-box" id="currentWord">DRAW A WORD</div>
        <div class="grid" id="grid"></div>
        <div id="message"></div>
      </div>

      <div class="word-list-container">
        <h3 style="margin: 0 0 10px 0; font-size: 0.8rem; color: #999;">FOUND WORDS</h3>
        <ul class="word-list" id="wordList"></ul>
      </div>
    </div>
  </div>

  <script>
    const BOARD_SIZE = 6;
    let DICTIONARY = new Set();
    const LETTER_POOL = 'AAAAAAAAAEEEEEEEEEEEEIIIIIIIIIOOOOOOOOUUUUDDDDGGGGBCMPFHVWYK JXQZ'.replace(/ /g,'').split('');

    let board = [];
    let selectedPath = [];
    let foundWords = new Set();
    let score = 0, timeLeft = 90, bestScore = 0;
    let timerId = null, gameActive = false, isDragging = false;

    function initDictionary() {
      // Direct integration of your word list [cite: 3]
      const rawWords = ["able","about","above","accept","across","act","action","add","after","again","age","ago","agree","air","all","allow","almost","along","also","always","am","among","amount","and","animal","another","answer","any","appear","are","area","around","arrive","art","as","ask","at","away","baby","back","bad","bag","ball","bank","base","be","bear","beat","beauty","because","become","bed","been","before","begin","behind","believe","best","better","between","big","bird","bit","black","blue","boat","body","book","both","box","boy","bring","build","busy","but","buy","by","call","came","can","car","care","carry","case","cat","cause","center","change","check","child","city","class","clean","clear","close","cold","come","common","complete","contain","continue","cool","copy","corn","cost","could","country","course","cover","create","cut","dark","data","day","dead","deal","decide","deep","develop","did","different","do","dog","done","door","down","draw","dream","drive","dry","during","each","early","earth","easy","eat","edge","end","enough","even","ever","every","example","eye","face","fact","fall","family","far","farm","fast","father","feel","feet","few","field","figure","fill","final","find","fine","fire","first","fish","fit","five","floor","follow","food","for","force","form","found","four","free","friend","from","front","full","fun","game","gave","get","girl","give","go","gold","good","got","great","green","ground","group","grow","had","half","hand","happen","hard","has","have","he","head","hear","heat","help","her","here","high","him","his","home","horse","hot","hour","house","how","however","idea","if","important","in","interest","into","is","it","job","join","just","keep","kind","king","knew","know","land","large","last","late","later","laugh","lead","learn","leave","left","less","let","letter","life","light","like","line","list","listen","little","live","long","look","lot","love","low","made","make","man","many","may","me","mean","measure","men","might","mile","mind","miss","more","most","mother","move","much","must","my","name","near","need","never","new","next","night","no","not","note","nothing","now","number","of","off","often","old","on","once","one","only","open","or","order","other","our","out","over","own","page","paper","part","pass","past","pay","people","perhaps","person","place","plan","play","point","power","press","problem","program","provide","put","question","quick","quite","rain","ran","reach","read","ready","real","reason","receive","record","red","remember","rest","result","right","river","road","rock","room","run","said","same","saw","say","school","sea","second","see","seem","self","send","several","she","should","show","side","simple","since","small","so","some","something","soon","sound","south","space","stand","start","state","stay","step","still","stop","story","street","strong","study","such","sun","system","take","talk","tell","ten","term","than","that","the","their","them","then","there","these","they","thing","think","this","those","thought","three","through","time","to","together","told","too","took","top","toward","town","tree","try","turn","two","under","until","up","upon","us","use","usually","very","want","war","was","watch","water","way","we","week","well","went","were","what","when","where","which","while","white","who","why","will","with","word","work","world","would","write","year","yes","yet","you","young","zip","zoo","zoom","zig","zag"];
      // Load all words into the searchable set [cite: 3]
      DICTIONARY = new Set(rawWords.map(w => w.toLowerCase()));
    }

    function buildBoard() {
      board = Array.from({ length: BOARD_SIZE }, () =>
        Array.from({ length: BOARD_SIZE }, () => LETTER_POOL[Math.floor(Math.random() * LETTER_POOL.length)])
      );
    }

    function renderBoard() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      board.forEach((row, r) => {
        row.forEach((letter, c) => {
          const tile = document.createElement('div');
          tile.className = 'tile' + (selectedPath.some(p => p.r === r && p.c === c) ? ' selected' : '');
          tile.textContent = letter;
          tile.dataset.r = r;
          tile.dataset.c = c;
          grid.appendChild(tile);
        });
      });
      const current = selectedPath.map(p => board[p.r][p.c]).join('');
      document.getElementById('currentWord').textContent = current || 'DRAW A WORD';
    }

    function handleMove(e) {
      if (!isDragging || !gameActive) return;
      
      const x = e.touches ? e.touches[0].clientX : e.clientX;
      const y = e.touches ? e.touches[0].clientY : e.clientY;
      const target = document.elementFromPoint(x, y);
      
      if (target && target.classList.contains('tile')) {
        const r = parseInt(target.dataset.r);
        const c = parseInt(target.dataset.c);
        
        // Check if this tile is already the one before the current one (allow back-tracking)
        if (selectedPath.length > 1) {
          const secondLast = selectedPath[selectedPath.length - 2];
          if (secondLast.r === r && secondLast.c === c) {
            selectedPath.pop();
            renderBoard();
            return;
          }
        }

        const alreadyInPath = selectedPath.find(p => p.r === r && p.c === c);
        if (!alreadyInPath) {
          const last = selectedPath[selectedPath.length - 1];
          if (!last || (Math.abs(last.r - r) <= 1 && Math.abs(last.c - c) <= 1)) {
            selectedPath.push({r, c});
            renderBoard();
          }
        }
      }
    }

    function handleEnd() {
      if (!isDragging) return;
      isDragging = false;
      const word = selectedPath.map(p => board[p.r][p.c]).join('').toLowerCase();
      const msg = document.getElementById('message');

      if (word.length >= 2) { // Changed to 2 to match list words like "am", "as", etc.
        if (DICTIONARY.has(word)) {
            if(!foundWords.has(word)) {
                foundWords.add(word);
                score += word.length; // Scoring based on length
                const li = document.createElement('li');
                li.textContent = word;
                document.getElementById('wordList').prepend(li);
                document.getElementById('wordsDisplay').textContent = foundWords.size;
                document.getElementById('scoreDisplay').textContent = score;
                msg.textContent = "✔ " + word.toUpperCase();
                msg.style.color = "var(--green)";
            } else {
                msg.textContent = "ALREADY FOUND";
                msg.style.color = "var(--gold)";
            }
        } else {
          msg.textContent = "NOT IN LIST";
          msg.style.color = "var(--pink)";
        }
      }
      
      selectedPath = [];
      renderBoard();
      setTimeout(() => { if(msg.textContent !== "") msg.textContent = ""; }, 1000);
    }

    function startNewGame() {
      foundWords.clear(); score = 0; timeLeft = 90;
      document.getElementById('wordList').innerHTML = '';
      document.getElementById('wordsDisplay').textContent = '0';
      document.getElementById('scoreDisplay').textContent = '0';
      document.getElementById('message').textContent = "";
      gameActive = true; buildBoard(); renderBoard();
      
      if (timerId) clearInterval(timerId);
      timerId = setInterval(() => {
        timeLeft--;
        const m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timeDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
        if (timeLeft <= 0) {
          clearInterval(timerId); gameActive = false;
          if (score > bestScore) { bestScore = score; document.getElementById('bestDisplay').textContent = score; }
          alert("Time's Up! You found " + foundWords.size + " words.");
        }
      }, 1000);
    }

    const grid = document.getElementById('grid');
    grid.addEventListener('mousedown', (e) => { if(gameActive) { isDragging = true; handleMove(e); } });
    grid.addEventListener('touchstart', (e) => { if(gameActive) { isDragging = true; handleMove(e); } }, {passive: false});
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove, {passive: false});
    window.addEventListener('mouseup', handleEnd);
    window.addEventListener('touchend', handleEnd);

    initDictionary();
    startNewGame();
  </script>
</body>
</html>
