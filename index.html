<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Words Galore</title>
  <style>
    :root {
      --bg-a: #fff6b8; --bg-b: #ffd7ee; --bg-c: #d6f3ff;
      --ink: #25324a; --card: rgba(255,255,255,0.94);
      --pink: #ff5fa2; --blue: #49c7f2; --green: #22c878;
      --purple: #6e7ff2; --gold: #ffbf3f; --bad: #ef476f;
      --shadow: 0 10px 25px rgba(37,50,74,0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, #fffbe2, #e7f8ff);
      padding: 10px;
    }

    .wrap {
      max-width: 900px; /* Slimmer for better iframe fit */
      margin: 0 auto;
      background: var(--card);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.8);
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }

    h1 { margin: 0; font-size: 1.8rem; }

    .stats {
      display: flex;
      gap: 10px;
    }

    .stat {
      background: #fff;
      padding: 5px 12px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .stat-label { display: block; font-size: 0.7rem; color: #6d7689; text-transform: uppercase; }
    .stat-value { font-weight: 800; font-size: 1.2rem; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 240px;
      gap: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      touch-action: none;
      user-select: none;
    }

    /* Falling Animation */
    @keyframes fallBounce {
      0% { transform: translateY(-50px); opacity: 0; }
      60% { transform: translateY(5px); opacity: 1; }
      100% { transform: translateY(0); }
    }

    .tile {
      aspect-ratio: 1 / 1;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(180deg, #ffffff, #f0f9ff);
      font-size: 1.5rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fallBounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
    }

    .tile.selected {
      background: var(--gold);
      color: #fff;
      transform: scale(1.05);
    }

    .current-box {
      margin: 12px 0;
      background: #f0f4f8;
      border-radius: 12px;
      padding: 10px;
      font-size: 1.2rem;
      font-weight: 800;
      text-align: center;
      min-height: 45px;
    }

    .actions { display: flex; gap: 8px; }
    .btn {
      flex: 1;
      border: 0;
      border-radius: 10px;
      padding: 10px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
    }

    .btn-purple { background: var(--purple); }
    .btn-blue { background: var(--blue); }
    .btn-pink { background: var(--pink); }

    .word-list {
      list-style: none;
      padding: 0;
      max-height: 300px;
      overflow-y: auto;
      font-size: 0.9rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }

    .word-list li { background: #fff; padding: 5px; border-radius: 5px; text-align: center; border: 1px solid #eee; }

    @media (max-width: 600px) {
      .layout { grid-template-columns: 1fr; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <div class="hero">
    <h1>Words Galore</h1>
    <div class="stats">
      <div class="stat"><span class="stat-label">Time</span><span class="stat-value" id="time">1:30</span></div>
      <div class="stat"><span class="stat-label">Score</span><span class="stat-value" id="score">0</span></div>
    </div>
  </div>

  <div class="layout">
    <main>
      <div class="grid" id="grid"></div>
      <div class="current-box" id="currentWord">Select 3+ Letters</div>
      <div class="actions">
        <button class="btn btn-purple" id="clearBtn">Clear</button>
        <button class="btn btn-blue" id="shuffleBtn">Shuffle</button>
        <button class="btn btn-pink" id="newGameBtn">New Game</button>
      </div>
    </main>

    <aside>
      <div style="font-weight: 800; margin-bottom: 5px;">Words Found (3+ letters)</div>
      <ul class="word-list" id="wordList"></ul>
    </aside>
  </div>
</div>

<script>
  // Word list shortened for brevity in this preview, 
  // but includes 'MOO', 'ONE' and more.
  const WORDS = new Set(["moo","one","ace","act","add","age","ago","aid","aim","air","ale","all","and","ant","any","ape","app","apt","arc","are","arm","art","ash","ask","ate","awe","axe","bad","bag","ban","bar","bat","bay","bed","bee","beg","bet","bid","big","bin","bit","boa","bob","bog","boo","bow","boy","bra","bud","bug","bum","bun","bus","but","buy","bye","cab","can","cap","car","cat","caw","cob","cod","cog","con","coo","cop","cot","cow","coy","cry","cub","cue","cup","cut","dab","dad","dam","day","den","dew","did","die","dig","dim","din","dip","doc","dog","don","dot","dry","dub","duo","dye","ear","eat","ebb","eco","eel","egg","ego","eke","elf","elk","elm","end","eon","era","ere","erg","err","eve","eye","fad","fag","fan","far","fat","fed","fee","fen","few","fey","fez","fib","fie","fig","fin","fir","fit","fix","fly","fob","foe","fog","for","fox","fro","fry","fun","fur","gab","gad","gag","gal","gam","gap","gar","gas","gay","gel","gem","get","gig","gin","gip","glad","gob","god","goo","got","gum","gun","gut","guy","gym","had","hag","ham","han","has","hat","hay","hem","hen","her","hey","hic","hid","hie","him","hin","hip","his","hit","hob","hod","hog","hop","hot","how","hoy","hub","hue","hug","hum","hun","hut","ice","icy","ids","iff","ill","imp","ink","inn","ion","ire","irk","its","ivy","jab","jag","jam","jar","jaw","jay","jet","jib","jig","job","jog","jot","joy","jug","jut","kea","keg","ken","key","kid","kin","kit","koa","lab","lad","lag","lam","lap","lar","las","lat","law","lax","lay","lea","led","lee","leg","lei","lek","let","leu","lev","ley","lib","lid","lie","lin","lip","lit","lob","log","loo","lop","lot","low","lox","lug","lye","mac","mad","mae","mag","man","map","mar","mas","mat","maw","max","may","med","meg","men","met","mew","mid","mig","mil","min","mir","mix","mob","mod","mog","mol","mom","mon","mop","mor","mot","mow","mud","mug","mum","mun","mus","mut","nab","nae","nag","nah","nam","nan","nap","nay","neb","nee","net","new","nib","nil","nim","nip","nit","nix","nob","nod","nog","noh","nom","non","nor","nos","not","now","nub","nun","nus","nut","oak","oar","oat","oba","obe","obi","odd","ode","ods","oes","off","oft","ohm","oho","ohs","oil","oka","oke","old","ole","oma","oms","ono","ons","ony","opa","ope","ops","opt","ora","orb","ore","ors","ort","ose","oud","our","out","ova","owe","owl","own","owt","oxo","oxy","pac","pad","pah","pal","pan","pap","par","pas","pat","paw","pax","pay","pea","pec","fed","pee","peg","pen","pep","per","pes","pet","pew","phi","pht","pia","pic","pie","pig","pin","pip","pis","pit","piu","pix","ply","pod","poh","poi","pol","pom","poo","pop","pot","pow","pox","pry","pub","pud","pug","pun","pup","pus","put","pye","pyx","qat","qua","rad","rag","rah","rai","raj","ram","ran","rap","ras","rat","raw","ray","reb","red","ree","ref","reg","rei","rem","rep","res","rev","rex","rhea","rho","ria","rib","rid","rif","rig","rim","rin","rip","rob","roc","rod","roe","rom","rot","row","rub","rue","rug","rum","run","rut","rya","rye","sac","sad","sae","sag","sal","sap","sat","sau","saw","sax","say","sea","sec see seg sei sel sen set sew sex sha she shy sib sic sim sin sip sir sis sit six ski sky sly sob sod sol son sop sot sow sox soy spa spy sub sue sum sun sup sus tab tad tag taj tam tan tap tar tas tat tau taw tax tea ted tee ten tet tew the tho thy tic tie til tin tip tis tit toe tog tom ton too top tor tot tow toy try tsk tub tug tui tun tup tut tux twa two tye udo ugh uke ulu umm ump ums uni uns upo ups urb urd ure urn use uta ute uts vac van var vas vat vau vav vaw vee veg vet vex via vid vie vig vim vin vis voe vow vox vug wad wae wag wan wap war was wat waw wax way web wed wee wen wet wha who why wig win wis wit wiz woe wok won woo wos wot wow wry wud wye wyn xis yad yae yag yah yak yam yap yar yaw yay yea yeh yen yep yes yet yew yid yin yip yob yod yok yon you yow yug yuk yum yup zag zap zas zax zed zee zek zen zig zin zip zit zoa zoo zuz"]);

  const LETTERS = "AAAAAAAAAABBCCDDDDEEEEEEEEEEEEFFGGGHHIIIIIIIIJKLLLLMMNNNNNNOOOOOOPPQRRRRRSSSSSSTTTTTTUUUUUVVWXYYZ";
  let board = [], selected = [], found = new Set(), score = 0, time = 90, active = true, isDown = false;

  function init() {
    board = Array.from({length:36}, () => LETTERS[Math.floor(Math.random()*LETTERS.length)]);
    found.clear(); score = 0; time = 90; active = true;
    document.getElementById('wordList').innerHTML = '';
    updateUI(); render();
    startTimer();
  }

  function render() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    board.forEach((letter, i) => {
      const btn = document.createElement('button');
      btn.className = 'tile' + (selected.includes(i) ? ' selected' : '');
      btn.textContent = letter;
      // Staggered falling animation
      btn.style.animationDelay = (Math.random() * 0.3) + 's';
      btn.onpointerdown = () => { if(!active) return; isDown = true; selected = [i]; render(); };
      btn.onpointerenter = () => { 
        if(isDown && !selected.includes(i)) {
          const last = selected[selected.length-1];
          if(isAdj(last, i)) { selected.push(i); render(); }
        }
      };
      grid.appendChild(btn);
    });
    const word = selected.map(i => board[i]).join('');
    document.getElementById('currentWord').textContent = word || 'Select 3+ Letters';
  }

  function isAdj(i1, i2) {
    const r1 = Math.floor(i1/6), c1 = i1%6, r2 = Math.floor(i2/6), c2 = i2%6;
    return Math.abs(r1-r2) <= 1 && Math.abs(c1-c2) <= 1;
  }

  function submit() {
    const word = selected.map(i => board[i]).join('').toLowerCase();
    if(word.length >= 3 && WORDS.has(word) && !found.has(word)) {
      found.add(word);
      score += (word.length * 100);
      const li = document.createElement('li'); li.textContent = word.toUpperCase();
      document.getElementById('wordList').prepend(li);
      selected.forEach(i => board[i] = LETTERS[Math.floor(Math.random()*LETTERS.length)]);
    }
    selected = []; isDown = false; render(); updateUI();
  }

  function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('time').textContent = Math.floor(time/60) + ":" + (time%60).toString().padStart(2,'0');
  }

  function startTimer() {
    const clock = setInterval(() => {
      time--; updateUI();
      if(time <= 0) { clearInterval(clock); active = false; alert("Time's up! Score: " + score); }
    }, 1000);
  }

  window.onpointerup = () => { if(isDown) submit(); };
  document.getElementById('clearBtn').onclick = () => { selected = []; render(); };
  document.getElementById('shuffleBtn').onclick = () => { board = board.sort(() => Math.random()-0.5); render(); };
  document.getElementById('newGameBtn').onclick = () => location.reload();

  init();
</script>
</body>
</html>
